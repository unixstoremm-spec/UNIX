<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - UNIX STREAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0c0c0d; color: #f9f9f9; }

        /* --- Header --- */
        header { padding: 30px 20px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: #fff; text-decoration: none; font-size: 20px; }
        .header-title { font-size: 18px; font-weight: 600; }

        /* --- Profile Info Section --- */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0 40px 0;
        }
        .profile-avatar-container {
            position: relative;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #fdd835;
            padding: 5px;
            object-fit: cover;
        }
        .edit-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #fdd835;
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 3px solid #0c0c0d;
        }
        .user-name { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
        .user-email { color: #888; font-size: 14px; margin-bottom: 20px; }

        /* --- Stats (Optional) --- */
        .user-stats {
            display: flex;
            gap: 40px;
            text-align: center;
            margin-bottom: 30px;
        }
        .stat-item h5 { font-size: 18px; color: #fdd835; }
        .stat-item p { font-size: 12px; color: #888; }

        /* --- Settings List --- */
        .settings-container {
            padding: 0 20px;
        }
        .settings-group {
            background: #121314;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .setting-item:last-child { border-bottom: none; }
        .setting-item:hover { background: rgba(253, 216, 53, 0.05); }
        
        .setting-left { display: flex; align-items: center; gap: 15px; }
        .setting-icon { 
            width: 35px; height: 35px; 
            background: rgba(253, 216, 53, 0.1); 
            color: #fdd835; 
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .setting-label { font-size: 15px; font-weight: 500; }
        .arrow-right { color: #444; font-size: 14px; }

        .logout-btn {
            color: #E21B23;
            justify-content: center;
            font-weight: 600;
        }

        /* --- Bottom Navigation --- */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(20, 21, 22, 0.95);
            backdrop-filter: blur(10px);
            height: 70px; border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
        }
        nav a { color: #666; font-size: 22px; text-decoration: none; }
        nav a.active { color: #fdd835; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-chevron-left"></i></a>
        <div class="header-title">My Profile</div>
        <div style="width: 20px;"></div> </header>

    <main>
        <section class="profile-header">
            <div class="profile-avatar-container">
                <img src="https://i.pinimg.com/originals/a6/58/32/a65832155622ac173337f5ee8838d046.png" class="profile-avatar" alt="User Avatar">
                <div class="edit-badge"><i class="fa-solid fa-camera"></i></div>
            </div>
            <h2 class="user-name">UNIX User</h2>
            <p class="user-email">unixstreamer@mail.com</p>

            <div class="user-stats">
                <div class="stat-item">
                    <h5>12</h5>
                    <p>Watchlist</p>
                </div>
                <div class="stat-item">
                    <h5>45</h5>
                    <p>Watched</p>
                </div>
                <div class="stat-item">
                    <h5>1.2k</h5>
                    <p>Points</p>
                </div>
            </div>
        </section>

        <section class="settings-container">
            <div class="settings-group">
                <a href="#" class="setting-item">
                    <div class="setting-left">
                        <div class="setting-icon"><i class="fa-solid fa-user-pen"></i></div>
                        <span class="setting-label">Edit Profile</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </a>
                <a href="#" class="setting-item">
                    <div class="setting-left">
                        <div class="setting-icon"><i class="fa-solid fa-bookmark"></i></div>
                        <span class="setting-label">My Watchlist</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </a>
                <a href="#" class="setting-item">
                    <div class="setting-left">
                        <div class="setting-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
                        <span class="setting-label">History</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </a>
            </div>

            <div class="settings-group">
                <a href="#" class="setting-item">
                    <div class="setting-left">
                        <div class="setting-icon"><i class="fa-solid fa-gear"></i></div>
                        <span class="setting-label">Settings</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </a>
                <a href="#" class="setting-item">
                    <div class="setting-left">
                        <div class="setting-icon"><i class="fa-solid fa-shield-halved"></i></div>
                        <span class="setting-label">Privacy Policy</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-right"></i>
                </a>
            </div>

            <div class="settings-group">
                <a href="#" class="setting-item logout-btn">
                    <span>Log Out</span>
                </a>
            </div>
        </section>
    </main>

    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i></a>
        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="#"><i class="fa-solid fa-bookmark"></i></a>
        <a href="profile.html" class="active"><i class="fa-solid fa-user"></i></a>
    </nav>

</body>
</html>
