<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - UNIX STREAM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #0c0c0d; color: #f9f9f9; padding-bottom: 100px; }

        /* Header */
        header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { color: #fff; text-decoration: none; font-size: 18px; }

        /* Profile Section */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0 30px 0;
        }
        
        /* ပုံမပေါ်တာကို ပြင်ဆင်ထားသည့် Avatar */
        .profile-avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin-bottom: 15px;
        }
        .profile-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #fdd835;
            object-fit: cover;
            background: #222; /* ပုံမတက်လာရင် အမည်းရောင်ဖြစ်နေအောင် */
        }
        .cam-icon {
            position: absolute;
            bottom: 5px;
            right: 0;
            background: #fdd835;
            color: #000;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 3px solid #0c0c0d;
        }

        .user-name { font-size: 20px; font-weight: 700; }
        .user-email { color: #666; font-size: 13px; margin-top: 4px; }

        /* Stats Row */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 25px 0;
            text-align: center;
        }
        .stat-box h5 { color: #fdd835; font-size: 18px; }
        .stat-box p { color: #666; font-size: 11px; margin-top: 2px; }

        /* Settings List */
        .menu-container { padding: 0 20px; }
        .menu-group {
            background: #121314;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            text-decoration: none;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-icon {
            width: 38px;
            height: 38px;
            background: rgba(253, 216, 53, 0.1);
            color: #fdd835;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
        .menu-text { flex-grow: 1; font-size: 14px; font-weight: 500; }
        .chevron { color: #444; font-size: 12px; }

        /* Bottom Nav Fix (စာသားထပ်နေတာကို ပြင်ထားသည်) */
        nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px;
            background: rgba(20, 21, 22, 0.95);
            backdrop-filter: blur(10px);
            height: 65px; border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 2000;
        }
        nav a { 
            color: #555; text-decoration: none; 
            display: flex; flex-direction: column; align-items: center;
            font-size: 18px; transition: 0.3s;
        }
        nav a span { font-size: 10px; margin-top: 4px; font-weight: 500; }
        nav a.active { color: #fdd835; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    </header>

    <main>
        <section class="profile-header">
            <div class="profile-avatar-wrapper">
                <img src="https://i.pinimg.com/736x/a6/58/32/a65832155622ac173337f5ee8838d046.jpg" class="profile-avatar" alt="User">
                <div class="cam-icon"><i class="fa-solid fa-camera"></i></div>
            </div>
            <h2 class="user-name">UNIX User</h2>
            <p class="user-email">unixstreamer@mail.com</p>

            <div class="stats-row">
                <div class="stat-box"><h5>12</h5><p>Watchlist</p></div>
                <div class="stat-box"><h5>45</h5><p>Watched</p></div>
                <div class="stat-box"><h5>1.2k</h5><p>Points</p></div>
            </div>
        </section>

        <section class="menu-container">
            <div class="menu-group">
                <a href="#" class="menu-item">
                    <div class="menu-icon"><i class="fa-solid fa-user-pen"></i></div>
                    <span class="menu-text">Edit Profile</span>
                    <i class="fa-solid fa-chevron-right chevron"></i>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon"><i class="fa-solid fa-bookmark"></i></div>
                    <span class="menu-text">My Watchlist</span>
                    <i class="fa-solid fa-chevron-right chevron"></i>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon"><i class="fa-solid fa-history"></i></div>
                    <span class="menu-text">History</span>
                    <i class="fa-solid fa-chevron-right chevron"></i>
                </a>
            </div>

            <div class="menu-group">
                <a href="#" class="menu-item">
                    <div class="menu-icon"><i class="fa-solid fa-gear"></i></div>
                    <span class="menu-text">Settings</span>
                    <i class="fa-solid fa-chevron-right chevron"></i>
                </a>
                <a href="#" class="menu-item" style="color: #E21B23;">
                    <div class="menu-icon" style="background: rgba(226, 27, 35, 0.1); color: #E21B23;"><i class="fa-solid fa-sign-out-alt"></i></div>
                    <span class="menu-text">Logout</span>
                </a>
            </div>
        </section>
    </main>

    <nav>
        <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="#"><i class="fa-solid fa-compass"></i><span>Discover</span></a>
        <a href="#"><i class="fa-solid fa-bookmark"></i><span>Watchlist</span></a>
        <a href="Profile.html" class="active"><i class="fa-solid fa-user"></i><span>Profile</span></a>
    </nav>

</body>
</html>
