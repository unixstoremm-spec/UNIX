<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIX STREAM - TVMOON Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0c0d; color: white; overflow-x: hidden; }
        .container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        nav { width: 260px; background: #121314; padding: 30px 20px; position: fixed; height: 100vh; border-right: 1px solid #222; transition: 0.3s; z-index: 100; }
        .logo { color: #fdd835; font-size: 24px; font-weight: bold; margin-bottom: 50px; display: block; text-decoration: none; }
        .nav-links a { display: block; color: #888; padding: 15px 0; text-decoration: none; font-size: 18px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #fdd835; }
        .nav-links i { margin-right: 15px; width: 20px; }

        /* Main Content */
        main { margin-left: 260px; width: calc(100% - 260px); padding: 40px; }
        header { display: flex; justify-content: flex-end; margin-bottom: 30px; }
        .search-box { background: rgba(255,255,255,0.05); border: 1.5px solid #fdd835; border-radius: 25px; padding: 8px 20px; width: 300px; color: white; outline: none; }

        /* Hero Banner */
        .hero { height: 450px; border-radius: 30px; background: linear-gradient(to right, rgba(0,0,0,0.9), transparent), url('https://image.tmdb.org/t/p/original/m99pLpUuR1S76f7H2Y1y9BvE8rO.jpg'); background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; padding: 60px; margin-bottom: 40px; }
        .hero h1 { font-size: 50px; margin-bottom: 15px; }
        .hero p { max-width: 500px; color: #ccc; margin-bottom: 25px; line-height: 1.6; }
        .btn-watch { background: #fdd835; color: black; padding: 12px 35px; border-radius: 30px; text-decoration: none; font-weight: bold; width: fit-content; transition: 0.3s; }
        .btn-watch:hover { transform: scale(1.05); }

        /* Movie Grid */
        .section-title { font-size: 22px; margin-bottom: 25px; color: #fdd835; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { background: #121314; border-radius: 20px; overflow: hidden; transition: 0.3s; cursor: pointer; text-decoration: none; color: white; }
        .movie-card:hover { transform: translateY(-10px); }
        .movie-card img { width: 100%; height: 260px; object-fit: cover; }
        .movie-card h3 { padding: 12px; font-size: 14px; text-align: center; }

        /* Responsive */
        @media (max-width: 1024px) {
            nav { width: 80px; padding: 30px 10px; text-align: center; }
            .logo, .nav-links span { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); padding: 20px; }
        }
        @media (max-width: 600px) {
            nav { display: none; }
            main { margin-left: 0; width: 100%; }
            .hero h1 { font-size: 30px; }
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="#" class="logo">UNIX</a>
            <div class="nav-links">
                <a href="#" class="active"><i class="fa-solid fa-house"></i> <span>Home</span></a>
                <a href="#"><i class="fa-solid fa-film"></i> <span>Movies</span></a>
                <a href="#"><i class="fa-solid fa-bookmark"></i> <span>Favorites</span></a>
                <a href="#"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
            </div>
        </nav>

        <main>
            <header>
                <input type="text" class="search-box" placeholder="Search movies...">
            </header>

            <div class="hero">
                <h1>The Garfield Movie</h1>
                <p>After an unexpected reunion with his long-lost father, Garfield and his canine friend Odie are forced into a high-stakes heist.</p>
                <a href="play.html?url=https://unixstoremm-my-test-bot.hf.space/stream/16?hash=0eda70" class="btn-watch">
    <i class="fa-solid fa-play"></i> Watch Now </a>
            </div>

            <h2 class="section-title">Popular Movies</h2>
            <div class="movie-grid">
                <a href="https://unixstoremm-my-test-bot.hf.space/stream/19?hash=e319c0" class="movie-card">
                    <img src="https://image.tmdb.org/t/p/w500/v99pLpUuR1S76f7H2Y1y9BvE8rO.jpg" alt="Garfield">
                    <h3>The Garfield Movie 1 </h3>
                </a>
                <a href="https://unixstoremm-my-test-bot.hf.space/stream/20?hash=e30e9e" class="movie-card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJrVOTQrlzEGAHyyLreyxbQFFk-pFWcO1nIkE3dbAf3z6E9gTE2_kBM13Y5fvCIiC60FKjbQ&s=10" alt="Home">
                    <h3>Home (2024)</h3>
                </a>
                </div>
        </main>
    </div>
</body>
</html>
