<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIX STREAM - Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- Clean & Modern Core --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background-color: #F0F2F5; color: #1A1D29; overflow-x: hidden; }

        /* --- Floating Navigation --- */
        nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            height: 65px; border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000; border: 1px solid rgba(253, 216, 53, 0.3);
        }
        nav a { color: #8E8E93; font-size: 22px; transition: 0.3s; }
        nav a.active { color: #fdd835; transform: translateY(-5px); }

        /* --- Top Header --- */
        header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; color: #fdd835; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .user-profile { width: 40px; height: 40px; border-radius: 50%; background: #fdd835; display: flex; align-items: center; justify-content: center; color: white; }

        /* --- Disney+ Main Feature Card --- */
        .hero-container { padding: 0 20px; margin-bottom: 30px; }
        .hero-card {
            width: 100%; height: 450px; border-radius: 30px;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%),
                        url('https://ntvb.tmsimg.com/assets/p28448171_v_h8_ad.jpg?w=1280&h=720');
            background-size: cover; background-position: center;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .hero-card h1 { font-size: 32px; color: white; margin-bottom: 5px; }
        .hero-card p { font-size: 14px; color: #ddd; margin-bottom: 20px; }
        .play-btn { 
            width: 60px; height: 60px; background: #fdd835; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 24px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(253, 216, 53, 0.4);
        }

        /* --- Channel Tiles (Marvel, Pixar, Disney Style) --- */
        .channels { padding: 0 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .channel-tile {
            background: white; height: 80px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee;
            font-weight: 800; font-size: 14px; text-transform: uppercase; color: #333;
        }
        .channel-tile:hover { border-color: #fdd835; transform: scale(1.05); }

        /* --- Movie Rows --- */
        .section-header { padding: 0 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-header h2 { font-size: 18px; font-weight: 700; }
        .section-header a { color: #fdd835; font-size: 13px; font-weight: 600; }

        .movie-row { display: flex; overflow-x: auto; padding: 0 20px; gap: 20px; scrollbar-width: none; }
        .movie-row::-webkit-scrollbar { display: none; }

        .movie-card { min-width: 160px; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .movie-card img { width: 100%; height: 220px; object-fit: cover; }
        .movie-info { padding: 12px; }
        .movie-info h3 { font-size: 13px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating { color: #fdd835; font-size: 11px; font-weight: 800; display: flex; align-items: center; gap: 4px; }

        /* --- Search Bar --- */
        .search-container { padding: 0 20px 20px 20px; }
        .search-bar { width: 100%; background: white; border: none; padding: 12px 20px; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); outline: none; }

    </style>
</head>
<body>

    </header>

        <div class="section-header">

            <a href="https://unixstoremm-my-test-bot.hf.space/stream/20?hash=e30e9e" class="movie-card">

                <div class="movie-info">
                    <h3>The Lost Bus</h3>

                </div>
            </a>

            <a href="https://unixstoremm-my-test-bot.hf.space/stream/22?hash=6a6ed7" class="movie-card">
                <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcRnBxg1VPXeRoYQ7tV8JK3ArgO2anv8qrypaVzXExLASr7wd_hb" alt="My Boo">

    </main>

    <nav>
        <a href="#" class="active"><i class="fa-solid fa-house"></i></a>
        <a href="#"><i class="fa-solid fa-bookmark"></i></a>

        <a href="#"><i class="fa-solid fa-gear"></i></a>
    </nav>

</body>
</html>
