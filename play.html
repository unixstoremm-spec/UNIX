<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIX STREAM - Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0c0d; color: white; font-family: sans-serif; overflow: hidden; }
        
        .nav-header { 
            padding: 15px 25px; 
            background: #121314; 
            display: flex; 
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .back-btn { 
            color: #fdd835; 
            text-decoration: none; 
            font-weight: bold; 
            display: flex; 
            align-items: center;
            gap: 10px;
        }

        .player-container {
            width: 100%;
            height: calc(100vh - 60px); /* Header စာကြောင်းစာ ဖယ်ထားတာပါ */
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Loading စာတန်း */
        .loading-text {
            position: absolute;
            z-index: -1;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn"> ← Back to Home </a>
    </div>

    <div class="player-container">
        <div class="loading-text">Loading Video...</div>
        <iframe id="videoFrame" src="" allowfullscreen="true" scrolling="no"></iframe>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const movieUrl = urlParams.get('url');

        if (movieUrl) {
            // URL ထဲက Link ကို iframe ထဲ တန်းထည့်လိုက်တာပါ
            document.getElementById('videoFrame').src = movieUrl;
        } else {
            alert("ဗီဒီယို Link ရှာမတွေ့ပါ!");
        }
    </script>

</body>
</html>
